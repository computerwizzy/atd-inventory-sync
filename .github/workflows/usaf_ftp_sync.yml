name: US Auto Force FTP Inventory Sync

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv

      - name: Run Sync Script
        env:
          USAUTOFORCE_FTP_HOST: ${{ secrets.USAUTOFORCE_FTP_HOST }}
          USAUTOFORCE_FTP_USER: ${{ secrets.USAUTOFORCE_FTP_USER }}
          USAUTOFORCE_FTP_PASS: ${{ secrets.USAUTOFORCE_FTP_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/sync_usaf_ftp.py
